services:
  - type: web
    name: vit-chain
    runtime: docker
    repo: https://github.com/vitnetwork/vit-chain
    branch: main
    dockerfilePath: ./Dockerfile
    # /ping always returns 200 instantly — no DB dependency.
    # /health is the deep check (reports DB + consensus state).
    healthCheckPath: /ping
    autoDeploy: true
    region: oregon
    plan: free
    envVars:
      - key: NETWORK
        value: testnet
      - key: CHAIN_ID
        value: "7764"
      - key: EPOCH_SECONDS
        value: "15"
      - key: SLASHING_DOWNTIME_SLOTS
        value: "50"
      - key: SLASHING_APPEAL_WINDOW_SLOTS
        value: "500"
      - key: LOG_LEVEL
        value: INFO
      - key: VIT_STORAGE_URL
        value: https://vit-storage-4trt.onrender.com
      - key: VIT_AI_URL
        value: https://vit-ai.onrender.com
      # P2P disabled on Render Free — saves RAM; enable when upgrading plan.
      - key: P2P_ENABLED
        value: "false"
      # Secrets below are injected via the `vitnetwork` env group:
      # DATABASE_URL, VIT_VALIDATOR_KEY, GENESIS_TREASURY_KEY,
      # REDIS_URL, GENESIS_VALIDATORS, GENESIS_PROPOSER_ADDRESS
